[package]
name = "rustos"
version = "0.1.0"
edition = "2021"

[profile.release]
opt-level = 3
codegen-units = 1
lto = true
panic = "abort"

[profile.dev]
panic = "abort"

[dependencies]
spin = { version = "0.9", features = ["mutex", "spin_mutex"] }
bitflags = "2"
linked_list_allocator = { version = "0.10", default-features = false, features = ["use_spin"] }

[build-dependencies]
cc = "1"

[features]
# Wayland compositor subsystem. Not part of the default kernel build.
# Enable with: cargo build --features wayland
# All code under src/wayland/ is cfg-gated on this feature.
wayland = []

# RISC-V UEFI boot path (EDK2 RiscVVirt).
# When enabled:
#   - src/arch/riscv64/uefi_entry.rs replaces src/arch/riscv64/boot.rs
#   - build target becomes riscv64-uefi.json (PE/COFF via lld-link)
#   - Use: ./build_riscv.sh --uefi   or   ./run_qemu_riscv.sh --uefi
uefi_boot = []

[lib]
name = "rustos"
path = "src/lib.rs"
crate-type = ["staticlib"]
