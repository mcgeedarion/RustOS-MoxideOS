[workspace]
members = [".", "xtask"]
resolver = "2"

[package]
name = "rustos"
version = "0.2.0"
edition = "2021"

[profile.release]
opt-level = 3
codegen-units = 1
lto = true
panic = "abort"

[profile.dev]
panic = "abort"

[dependencies]
spin = { version = "0.9", features = ["mutex", "spin_mutex"] }
bitflags = "2"
linked_list_allocator = { version = "0.10", default-features = false, features = ["use_spin"] }

[build-dependencies]
cc = "1"

[features]
# RISC-V UEFI boot path (EDK2 RiscVVirt) — enabled by default.
# When enabled:
#   - src/arch/riscv64/uefi_entry.rs replaces src/arch/riscv64/boot.rs
#   - build target is riscv64-uefi.json (PE/COFF via lld-link)
#   - Use: cargo xtask build
# To use SBI boot instead:
#   - cargo xtask build --arch riscv64 --boot sbi
default = ["uefi_boot"]
uefi_boot = []

# Wayland compositor subsystem. Not part of the default kernel build.
# Enable with: cargo build --features wayland
# All code under src/wayland/ is cfg-gated on this feature.
wayland = []

[lib]
name = "rustos"
path = "src/lib.rs"
crate-type = ["staticlib"]
