[workspace]
members = [".", "xtask"]
resolver = "2"

[package]
name = "rustos"
version = "0.2.0"
edition = "2021"

[profile.release]
opt-level = 3
codegen-units = 1
lto = true
panic = "abort"

[profile.dev]
panic = "abort"

[dependencies]
spin = { version = "0.9", features = ["mutex", "spin_mutex"] }
bitflags = "2"
linked_list_allocator = { version = "0.10", default-features = false, features = ["use_spin"] }

[build-dependencies]
cc = "1"

[features]
# ── Default build ────────────────────────────────────────────────────────────────────
# Includes: scheduler (CFS/RR/DEADLINE), VFS (ext2/fat32/tmpfs/devfs/procfs),
#           mm (VMM/PMM/COW/mmap), proc (futex/signals/threads/clone),
#           net (TCP/UDP/Unix sockets), SMP (AP bringup/IPI/percpu),
#           security (ASLR/canary/PTI/SMEP/SMAP/seccomp/capset),
#           tty, console, UEFI boot, drivers, syscall table,
#           SysV IPC + POSIX mq, Linux namespaces (5 types).
#
# cargo build                         → default
# cargo build --features cgroups      → + cgroups v1 controllers
# cargo build --features gdbstub      → + GDB RSP stub
# cargo build --features input_events → + /dev/input evdev layer (WIP)
# cargo build --features wayland      → + Wayland compositor scaffold (WIP)
default = ["uefi_boot", "sysv_ipc", "namespaces"]

# ── Boot path ────────────────────────────────────────────────────────────────────
uefi_boot = []

# ── Stable subsystems (on by default) ────────────────────────────────────────

# System V IPC + POSIX message queues.
# Status: Stable. NR 29–31, 64–71, 240–245 fully wired. CAP_IPC_OWNER
#   always-grants (pre-namespace behavior; full check requires user ns).
sysv_ipc = []

# Linux-compatible namespace isolation.
# Status: Stable.
#   Namespace types: NEWNS (mount), NEWPID, NEWNET, NEWUTS, NEWIPC, NEWUSER.
#   unshare(2)  [NR 272]: fully wired; forks mount/net backing state.
#   setns(2)    [NR 308]: fully wired; resolves ns fd → NsSet install.
#   /proc/<pid>/ns/: synthetic symlinks + stat inodes in procfs.
#   ns_fd_open: NSFD_FD_BASE synthetic fds usable directly with setns.
#   Remaining: CAP_SYS_ADMIN check for CLONE_NEWUSER outside existing
#     user ns is always-grant for root; non-root enforcement is future work.
namespaces = []

# ── WIP / optional subsystems ────────────────────────────────────────────────

# GDB remote serial protocol stub — x86_64 (UART/COM1) + RISC-V (SBI console).
# Status: Complete.
#   Packets: ?, g/G, p/P, m/M, X, s, c, Z0/z0, H, T, qSupported,
#     qAttached, qC, qfThreadInfo, qsThreadInfo, qOffsets, vCont, vKill, D, k.
#   x86_64: RFLAGS.TF single-step; RISC-V: sstatus.SSTEP.
gdbstub = []

# Linux /dev/input evdev routing layer.
# Status: stub no-ops — event routing to /dev/input/eventN not yet wired.
input_events = []

# cgroups v1: cpu (shares + CFS bandwidth), memory (hard limit + OOM), pids.
# Status: hierarchy + knob API complete; /sys/fs/cgroup cgroupfs mount missing.
cgroups = []

# Wayland compositor subsystem.
# Status: directory scaffolded, no protocol implementation yet.
wayland = []
