[package]
name = "rustos"
version = "0.1.0"
edition = "2021"

[profile.release]
opt-level = 3
codegen-units = 1
lto = true
panic = "abort"

[profile.dev]
panic = "abort"

[dependencies]
spin = { version = "0.9", features = ["mutex", "spin_mutex"] }
bitflags = "2"
linked_list_allocator = { version = "0.10", default-features = false }

[build-dependencies]
cc = "1"

[features]
# Wayland compositor subsystem. Not part of the default kernel build.
# Enable with: cargo build --features wayland
# All code under src/wayland/ is cfg-gated on this feature.
wayland = []

[lib]
name = "rustos"
path = "src/lib.rs"
crate-type = ["staticlib"]
