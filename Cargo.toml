[workspace]
members  = [".", "xtask"]
resolver = "2"

[package]
name    = "rustos"
version = "0.2.0"
edition = "2021"

# ── Profiles ────────────────────────────────────────────────────────────────

[profile.release]
opt-level      = 3
codegen-units  = 1
lto            = true
panic          = "abort"

[profile.dev]
panic = "abort"

# ── Dependencies ────────────────────────────────────────────────────────────

[dependencies]
spin                  = { version = "0.9", features = ["mutex", "spin_mutex"] }
bitflags              = "2"
linked_list_allocator = { version = "0.10", default-features = false, features = ["use_spin"] }

[build-dependencies]
cc = "1"

# ── Features ────────────────────────────────────────────────────────────────
#
# Boot paths (mutually exclusive):
#   cargo build                                       → UEFI (default)
#   cargo build --no-default-features \
#     --features multiboot2_boot,sysv_ipc,namespaces  → multiboot2 / GRUB2
#
# Optional subsystems:
#   --features cgroups       → cgroups v2 cgroupfs
#   --features gdbstub       → GDB RSP stub (UART/SBI)
#   --features input_events  → /dev/input evdev layer (WIP)
#   --features wayland       → Wayland compositor scaffold (WIP)

[features]
default = ["uefi_boot", "sysv_ipc", "namespaces"]

# Boot paths
uefi_boot       = []  # PE32+ BOOTX64.EFI via build.rs; primary path
multiboot2_boot = []  # GRUB2 / QEMU -kernel fallback; use --no-default-features

# Stable subsystems (enabled by default)
sysv_ipc   = []  # SysV IPC + POSIX message queues (NR 29-31, 64-71, 240-245)
namespaces = []  # Linux-compatible ns isolation (NEWNS/PID/NET/UTS/IPC/USER)

# Optional / WIP subsystems
gdbstub      = []  # Complete: GDB RSP over UART (x86_64) / SBI console (RISC-V)
cgroups      = []  # Complete: cgroups v2 hierarchy + cgroupfs VFS mount
input_events = []  # WIP stub: /dev/input evdev routing not yet wired
wayland      = []  # WIP stub: directory scaffolded, no protocol implementation
