[alias]
xtask = "run --target x86_64-unknown-linux-gnu -p xtask --"

# Default target is overridden per-invocation by xtask via --target.
# This fallback keeps `cargo build` (without xtask) pointing at the
# riscv64 UEFI loader so accidental bare builds don't silently use the
# host triple.  Change to whichever arch you're actively working on.
[build]
target = "targets/riscv64-uefi-loader.json"
