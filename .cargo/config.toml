[alias]
xtask = "run --target x86_64-unknown-linux-gnu -p xtask --"

# Plain `cargo build` now builds the repository-default boot artifact: the
# aarch64 UEFI loader/application. Use `cargo xtask image --arch aarch64` when
# you need the FAT ESP image containing EFI/BOOT/BOOTAA64.EFI for firmware/QEMU
# boot.
#
# x86_64 and riscv64 remain explicit targets:
#   cargo build --target targets/x86_64-kernel.json
#   cargo build --target riscv64gc-unknown-none-elf --no-default-features
[build]
target = "targets/aarch64-uefi-loader.json"

# Required for the freestanding kernel target. Keeping this in Cargo config makes
# the default command path explicit instead of hiding it in scripts only.
[unstable]
build-std = ["core", "alloc", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
json-target-spec = true
