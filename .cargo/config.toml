[alias]
xtask = "run --target x86_64-unknown-linux-gnu -p xtask --"

# Plain `cargo build` now builds the primary boot artifact: the x86_64 UEFI
# kernel ELF. Use `cargo xtask image --arch x86_64` when you need the FAT32 ESP
# image containing EFI/BOOT/BOOTX64.EFI for firmware/QEMU boot.
[build]
target = "targets/x86_64-kernel.json"

# Required for the freestanding kernel target. Keeping this in Cargo config makes
# the default command path explicit instead of hiding it in scripts only.
[unstable]
build-std = ["core", "alloc", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
json-target-spec = true
