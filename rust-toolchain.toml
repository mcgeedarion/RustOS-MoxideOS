# rust-toolchain.toml
#
# Pins the Rust toolchain used by this repository.
#
# Keep this date synchronized with:
#   - flake.nix: nightlyDate
#
# Why nightly is currently required:
#   - The kernel crate uses nightly feature gates.
#   - The build uses -Z build-std for freestanding/custom targets.
#
# When upgrading:
#   1. Update `channel` below.
#   2. Update `nightlyDate` in flake.nix to the same date.
#   3. Run the normal build matrix:
#        cargo build --target targets/aarch64-uefi-loader.json
#        cargo build --target riscv64gc-unknown-none-elf --no-default-features
#        cargo build --target targets/riscv64-uefi.json --features uefi_boot
#        cargo build --target x86_64-unknown-none --no-default-features
#   4. Run formatting and lint checks.
#   5. Document the upgrade reason in CHANGELOG.md.

[toolchain]
channel = "nightly-2026-06-07"
profile = "minimal"

components = [
  "rust-src",            # Required by -Z build-std.
  "llvm-tools-preview",  # Required by cargo-binutils / llvm tools.
  "rustfmt",             # Required by cargo fmt / CI formatting checks.
  "clippy",              # Required by cargo clippy / CI lint checks.
]

targets = [
  "riscv64gc-unknown-none-elf",  # RISC-V SBI / bare-metal target.
  "x86_64-unknown-none",         # x86_64 bare-metal target.
]

# Custom JSON targets are not rustup-installed targets:
#   - targets/aarch64-uefi-loader.json
#   - targets/riscv64-uefi.json
