name: fmt

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: "rustfmt check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-fmt-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: ${{ runner.os }}-fmt-

      - name: Check formatting
        run: |
          # virtio_gpu.rs currently contains markdown (not Rust) — exclude it
          # until the real driver is written.
          find src tests xtask userspace -name '*.rs' \
            ! -path 'src/drivers/virtio_gpu.rs' \
            | xargs rustfmt --edition 2021 --check
