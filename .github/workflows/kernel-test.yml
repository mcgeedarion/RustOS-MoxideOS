# Reusable kernel build + QEMU smoke + kmtest workflow.
#
# Called by build.yml, qemu-smoke.yml, and kmtest.yml via `uses:`.
# All arch-specific differences live here as `if:` guards on steps.
# Callers only supply the matrix row via `inputs`.
#
# Supported architectures
# ──────────────────────────────────────────────────────────────────────────────
#   arch        cargo-target                      qemu-bin               boot
#   aarch64     targets/aarch64-kernel.json       qemu-system-aarch64    virt/cortex-a72
#   riscv64     riscv64gc-unknown-none-elf         qemu-system-riscv64    OpenSBI virt
#   x86_64      x86_64-unknown-none               qemu-system-x86_64     OVMF UEFI (FAT32 ESP image)
# ──────────────────────────────────────────────────────────────────────────────
#
# Adding a new architecture
#   1. Add a `matrix.include` row in the caller workflow.
#   2. Add an `if: inputs.arch == 'newarch'` step below for anything
#      that differs (apt packages, QEMU flags, feature flags).
#   3. Create tests/arch/newarch/ with arch-specific test stubs.

name: Kernel Test (reusable)

on:
  workflow_call:
    inputs:
      # ── Required ────────────────────────────────────────────────────────────
      arch:
        description: "Target architecture: aarch64 | riscv64 | x86_64"
        required: true
        type: string

      # ── Job-mode flags (callers set exactly one to true) ────────────────────
      run_build:
        description: "Run cargo build (debug + release)"
        required: false
        type: boolean
        default: false

      run_smoke:
        description: "Run QEMU boot + NIC smoke test"
        required: false
        type: boolean
        default: false

      run_kmtest:
        description: "Run kmtest suite via QEMU initramfs"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  kernel-test:
    name: "${{ inputs.arch }} [${{ inputs.run_build && 'build' || '' }}${{ inputs.run_smoke && 'smoke' || '' }}${{ inputs.run_kmtest && 'kmtest' || '' }}]"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: file
          components: rust-src, llvm-tools-preview, rustfmt, clippy

      # Register the custom target JSON paths so cargo can find them.
      - name: Set CARGO_TARGET_DIR and custom target env
        run: |
          echo "CARGO_TARGET_DIR=${{ github.workspace }}/target" >> "$GITHUB_ENV"
          # Resolve the cargo --target flag for this arch.
          case "${{ inputs.arch }}" in
            aarch64) echo "CARGO_TARGET=${{ github.workspace }}/targets/aarch64-kernel.json" >> "$GITHUB_ENV" ;;
            riscv64) echo "CARGO_TARGET=riscv64gc-unknown-none-elf"        >> "$GITHUB_ENV" ;;
            x86_64)  echo "CARGO_TARGET=x86_64-unknown-none"              >> "$GITHUB_ENV" ;;
          esac
          # Short name used for artifact/log labelling (no path chars).
          case "${{ inputs.arch }}" in
            aarch64) echo "TARGET_SHORT=aarch64-kernel"                    >> "$GITHUB_ENV" ;;
            riscv64) echo "TARGET_SHORT=riscv64gc-unknown-none-elf"        >> "$GITHUB_ENV" ;;
            x86_64)  echo "TARGET_SHORT=x86_64-unknown-none"              >> "$GITHUB_ENV" ;;
          esac

      # ── Cargo cache (keyed by arch so caches never collide) ──────────────────
      - uses: Swatinem/rust-cache@v2
        with:
          key: "${{ inputs.arch }}-${{ inputs.run_build && 'build' || inputs.run_smoke && 'smoke' || 'kmtest' }}-${{ hashFiles('rust-toolchain.toml') }}"

      # ── Arch-specific apt packages ────────────────────────────────────────────
      - name: Install build tools (aarch64)
        if: inputs.arch == 'aarch64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends clang lld

      - name: Install build tools (riscv64)
        if: inputs.arch == 'riscv64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends clang lld

      - name: Install build tools (x86_64)
        if: inputs.arch == 'x86_64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends clang lld llvm

      # ── QEMU + firmware (only for smoke / kmtest modes) ───────────────────────
      - name: Install QEMU (aarch64)
        if: (inputs.run_smoke || inputs.run_kmtest) && inputs.arch == 'aarch64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends qemu-system-arm

      - name: Install QEMU (riscv64)
        if: (inputs.run_smoke || inputs.run_kmtest) && inputs.arch == 'riscv64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends qemu-system-riscv64

      - name: Install QEMU + firmware (x86_64)
        if: (inputs.run_smoke || inputs.run_kmtest) && inputs.arch == 'x86_64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf mtools

      # ── musl cross-compiler (kmtest userspace runner) ─────────────────────────
      - name: Install musl cross-tools (aarch64)
        if: inputs.run_kmtest && inputs.arch == 'aarch64'
        run: |
          sudo apt-get install -y --no-install-recommends \
            musl-tools gcc-aarch64-linux-gnu libc-dev-arm64-cross || true

      - name: Install musl cross-tools (riscv64)
        if: inputs.run_kmtest && inputs.arch == 'riscv64'
        run: |
          sudo apt-get install -y --no-install-recommends \
            musl-tools gcc-riscv64-linux-gnu libc-dev-riscv64-cross || true

      - name: Install musl cross-tools (x86_64)
        if: inputs.run_kmtest && inputs.arch == 'x86_64'
        run: |
          sudo apt-get install -y --no-install-recommends musl-tools

      # ════════════════════════════════════════════════════════════════════════
      # BUILD MODE
      # ════════════════════════════════════════════════════════════════════════

      - name: Determine build features
        if: inputs.run_build || inputs.run_smoke || inputs.run_kmtest
        run: |
          case "${{ inputs.arch }}" in
            aarch64)
              echo "EXTRA_CARGO_FLAGS=" >> "$GITHUB_ENV"
              echo "KMTEST_EXTRA_FEATURES=" >> "$GITHUB_ENV"
              ;;
            riscv64)
              echo "EXTRA_CARGO_FLAGS=" >> "$GITHUB_ENV"
              echo "KMTEST_EXTRA_FEATURES=" >> "$GITHUB_ENV"
              ;;
            x86_64)
              echo "EXTRA_CARGO_FLAGS=--no-default-features" >> "$GITHUB_ENV"
              echo "KMTEST_EXTRA_FEATURES=sysv_ipc,namespaces" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Build kernel (debug)
        if: inputs.run_build || inputs.run_smoke || inputs.run_kmtest
        run: |
          FEATURES="${{ inputs.run_kmtest && 'kmtest' || '' }}"
          [[ -n "${KMTEST_EXTRA_FEATURES}" && -n "${FEATURES}" ]] && \
            FEATURES="${FEATURES},${KMTEST_EXTRA_FEATURES}"

          FEAT_FLAG=""
          [[ -n "${FEATURES}" ]] && FEAT_FLAG="--features ${FEATURES}"

          cargo build \
            --target "${CARGO_TARGET}" \
            ${EXTRA_CARGO_FLAGS} \
            ${FEAT_FLAG} \
            -Z build-std=core,alloc,compiler_builtins \
            -Z build-std-features=compiler-builtins-mem \
            2>&1 | tee "build-${{ inputs.arch }}.log"

          # Canonicalize ELF path for later steps.
          ELF="target/${TARGET_SHORT}/debug/rustos"
          test -f "${ELF}" || { echo "ELF not found at ${ELF}"; exit 1; }
          file "${ELF}"
          echo "KERNEL_ELF=${ELF}" >> "$GITHUB_ENV"

      - name: Build kernel (release)
        if: inputs.run_build
        run: |
          cargo build --release \
            --target "${CARGO_TARGET}" \
            ${EXTRA_CARGO_FLAGS} \
            -Z build-std=core,alloc,compiler_builtins \
            -Z build-std-features=compiler-builtins-mem \
            2>&1 | tee "build-${{ inputs.arch }}-release.log"

      # ════════════════════════════════════════════════════════════════════════
      # SMOKE MODE  — boot kernel, probe NIC, check serial markers
      # ════════════════════════════════════════════════════════════════════════

      - name: QEMU smoke test (aarch64)
        if: inputs.run_smoke && inputs.arch == 'aarch64'
        run: |
          mkdir -p logs/aarch64
          timeout 15 qemu-system-aarch64 \
            -machine virt \
            -cpu cortex-a72 \
            -m 256M \
            -kernel "${KERNEL_ELF}" \
            -netdev user,id=net0,net=10.0.2.0/24,host=10.0.2.2,dns=10.0.2.3,dhcpstart=10.0.2.15 \
            -device virtio-net-device,netdev=net0,id=nic0 \
            -serial stdio -display none -no-reboot \
            -d guest_errors,cpu_reset \
            2>&1 | tee logs/aarch64/serial.log qemu-${{ inputs.arch }}.log || true

      - name: QEMU smoke test (riscv64)
        if: inputs.run_smoke && inputs.arch == 'riscv64'
        run: |
          mkdir -p logs/riscv64
          timeout 15 qemu-system-riscv64 \
            -machine virt \
            -cpu rv64 \
            -smp 2 \
            -m 256M \
            -bios default \
            -kernel "${KERNEL_ELF}" \
            -netdev user,id=net0,net=10.0.2.0/24,host=10.0.2.2,dns=10.0.2.3,dhcpstart=10.0.2.15 \
            -device virtio-net-device,netdev=net0,id=nic0 \
            -serial stdio -display none -no-reboot \
            -d guest_errors,cpu_reset \
            2>&1 | tee logs/riscv64/serial.log qemu-${{ inputs.arch }}.log || true

      # x86_64: build a FAT32 ESP image via xtask, then boot with OVMF pflash.
      # -kernel is intentionally NOT used — it bypasses UEFI entirely.
      - name: Build x86_64 UEFI ESP image
        if: inputs.run_smoke && inputs.arch == 'x86_64'
        run: |
          cargo xtask image --arch x86_64 --debug \
            2>&1 | tee "build-x86_64-image.log"
          test -f boot-x86_64.img || { echo "boot-x86_64.img not produced"; exit 1; }
          echo "BOOT_IMG=boot-x86_64.img" >> "$GITHUB_ENV"

      - name: QEMU smoke test (x86_64)
        if: inputs.run_smoke && inputs.arch == 'x86_64'
        run: |
          mkdir -p logs/x86_64
          cp /usr/share/OVMF/OVMF_VARS.fd /tmp/OVMF_VARS.fd
          timeout 15 qemu-system-x86_64 \
            -machine q35 \
            -cpu qemu64 \
            -m 256M \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE.fd \
            -drive if=pflash,format=raw,file=/tmp/OVMF_VARS.fd \
            -drive if=virtio,format=raw,file="${BOOT_IMG}" \
            -netdev user,id=net0,net=10.0.2.0/24,host=10.0.2.2,dns=10.0.2.3,dhcpstart=10.0.2.15 \
            -device virtio-net-pci,netdev=net0,id=nic0 \
            -serial stdio -display none -no-reboot \
            -d guest_errors,cpu_reset \
            2>&1 | tee logs/x86_64/serial.log qemu-${{ inputs.arch }}.log || true

      - name: Assert smoke markers
        if: inputs.run_smoke
        run: |
          LOG="qemu-${{ inputs.arch }}.log"
          cat "${LOG}"

          fail() { echo "❌ $1"; exit 1; }
          pass() { echo "✅ $1"; }

          grep -q 'kernel_main reached'    "${LOG}" && pass "boot"        || fail "boot marker missing"
          grep -q 'nic: registered device' "${LOG}" && pass "nic-reg"     || fail "NIC registration missing"

          # Arch-specific NIC probe string differs (pci vs mmio driver).
          case "${{ inputs.arch }}" in
            aarch64|riscv64)
              grep -q 'virtio_net_mmio: device ready' "${LOG}" && pass "nic-probe" || fail "NIC probe missing"
              ;;
            x86_64)
              grep -q 'virtio_net: device ready'      "${LOG}" && pass "nic-probe" || fail "NIC probe missing"
              ;;
          esac

          # riscv64-only: SMP + PLIC assertions.
          if [[ "${{ inputs.arch }}" == "riscv64" ]]; then
            grep -q 'smp: all 2 harts online'        "${LOG}" && pass "smp"       || fail "SMP bringup missing"
            grep -q 'plic: AP context 3 initialised' "${LOG}" && pass "plic"      || fail "PLIC AP context missing"
          fi

          # CL test pass markers (shared across all arches).
          FAILED=0
          for t in alloc_smoke trap_smoke uart_smoke; do
            grep -q "TEST PASS: ${t}" "${LOG}" && pass "${t}" || \
              { echo "  ❌ ${t}"; FAILED=$((FAILED+1)); }
          done
          [ $FAILED -eq 0 ] || exit 1

      # ── Arch test validation (runs after smoke captures serial.log) ───────────
      - name: Run arch-specific tests and collect logs
        if: inputs.run_smoke && always()
        env:
          ARCH: ${{ inputs.arch }}
        run: |
          chmod +x scripts/ci/collect-logs.sh
          scripts/ci/collect-logs.sh

      # ════════════════════════════════════════════════════════════════════════
      # KMTEST MODE  — userspace runner + initramfs + kernel self-test harness
      # ════════════════════════════════════════════════════════════════════════

      - name: Build kmtest userspace runner
        if: inputs.run_kmtest
        run: |
          cd userspace
          make ARCH="${{ inputs.arch }}" kmtest \
            2>&1 | tee "../build-kmtest-runner-${{ inputs.arch }}.log"
          test -f "build/${{ inputs.arch }}/kmtest"

      - name: Stage kmtest runner into initramfs
        if: inputs.run_kmtest
        run: |
          STAGING="initramfs-kmtest-${{ inputs.arch }}/bin"
          mkdir -p "${STAGING}"
          cp "userspace/build/${{ inputs.arch }}/kmtest" "${STAGING}/kmtest"
          chmod +x "${STAGING}/kmtest"

      - name: QEMU kmtest boot (aarch64)
        if: inputs.run_kmtest && inputs.arch == 'aarch64'
        run: |
          timeout 60 qemu-system-aarch64 \
            -machine virt \
            -cpu cortex-a72 \
            -m 256M \
            -kernel "${KERNEL_ELF}" \
            -initrd <(find "initramfs-kmtest-${{ inputs.arch }}" -mindepth 1 | \
                      cpio -o -H newc --quiet) \
            -append "init=/bin/kmtest" \
            -serial stdio -display none -no-reboot \
            -d guest_errors,cpu_reset \
            2>&1 | tee "qemu-kmtest-${{ inputs.arch }}.log" || true

      - name: QEMU kmtest boot (riscv64)
        if: inputs.run_kmtest && inputs.arch == 'riscv64'
        run: |
          timeout 60 qemu-system-riscv64 \
            -machine virt \
            -cpu rv64 \
            -m 256M \
            -bios default \
            -kernel "${KERNEL_ELF}" \
            -initrd <(find "initramfs-kmtest-${{ inputs.arch }}" -mindepth 1 | \
                      cpio -o -H newc --quiet) \
            -append "init=/bin/kmtest" \
            -serial stdio -display none -no-reboot \
            -d guest_errors,cpu_reset \
            2>&1 | tee "qemu-kmtest-${{ inputs.arch }}.log" || true

      # x86_64 kmtest: build a UEFI ESP image that also contains the initramfs,
      # then boot via OVMF — same as smoke, no -kernel shortcut.
      - name: Build x86_64 UEFI ESP image (kmtest)
        if: inputs.run_kmtest && inputs.arch == 'x86_64'
        run: |
          sudo apt-get install -y --no-install-recommends mtools
          # Pack the kmtest initramfs so xtask can embed it.
          find "initramfs-kmtest-x86_64" -mindepth 1 | \
            cpio -o -H newc --quiet > initramfs.cpio
          cargo xtask image --arch x86_64 --debug --initrd \
            2>&1 | tee "build-x86_64-kmtest-image.log"
          test -f boot-x86_64.img || { echo "boot-x86_64.img not produced"; exit 1; }
          echo "BOOT_IMG_KMTEST=boot-x86_64.img" >> "$GITHUB_ENV"

      - name: QEMU kmtest boot (x86_64)
        if: inputs.run_kmtest && inputs.arch == 'x86_64'
        run: |
          cp /usr/share/OVMF/OVMF_VARS.fd /tmp/OVMF_VARS_kmtest.fd
          timeout 60 qemu-system-x86_64 \
            -machine q35 \
            -cpu qemu64,+xsave,+avx \
            -m 256M \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE.fd \
            -drive if=pflash,format=raw,file=/tmp/OVMF_VARS_kmtest.fd \
            -drive if=virtio,format=raw,file="${BOOT_IMG_KMTEST}" \
            -serial stdio -display none -no-reboot \
            -d guest_errors,cpu_reset \
            2>&1 | tee "qemu-kmtest-${{ inputs.arch }}.log" || true

      - name: Parse kmtest results
        if: inputs.run_kmtest
        run: |
          LOG="qemu-kmtest-${{ inputs.arch }}.log"
          echo "--- kmtest output (${{ inputs.arch }}) ---"
          grep -E '^(  (PASS|FAIL)|kmtest:)' "${LOG}" || true
          echo "---"

          SUMMARY=$(grep '^kmtest: ' "${LOG}" || true)
          if [[ -z "${SUMMARY}" ]]; then
            echo "::error::kmtest summary line not found — was --features kmtest included?" >&2
            exit 2
          fi
          echo "${SUMMARY}"

          if grep -q '^  FAIL ' "${LOG}"; then
            NFAIL=$(grep -c '^  FAIL ' "${LOG}")
            echo "::error::${NFAIL} kmtest(s) failed on ${{ inputs.arch }}" >&2
            exit 1
          fi

          if ! echo "${SUMMARY}" | grep -qE '^kmtest: ([0-9]+)/\1 passed$'; then
            echo "::error::kmtest reported failures: ${SUMMARY}" >&2
            exit 1
          fi

          echo "✅ All ${{ inputs.arch }} kmtests passed."

      # ════════════════════════════════════════════════════════════════════════
      # ARTIFACTS  — always upload, named and partitioned by arch
      # ════════════════════════════════════════════════════════════════════════

      - name: Upload build artifacts
        if: inputs.run_build && always()
        uses: actions/upload-artifact@v4
        with:
          name: "build-${{ inputs.arch }}"
          path: |
            build-${{ inputs.arch }}.log
            build-${{ inputs.arch }}-release.log
            target/${{ env.TARGET_SHORT }}/release/rustos

      - name: Upload smoke logs
        if: inputs.run_smoke && always()
        uses: actions/upload-artifact@v4
        with:
          name: "smoke-${{ inputs.arch }}"
          path: |
            build-${{ inputs.arch }}.log
            build-${{ inputs.arch }}-image.log
            qemu-${{ inputs.arch }}.log
            logs/${{ inputs.arch }}/serial.log
            artifacts/${{ inputs.arch }}/test-report.txt
            artifacts/${{ inputs.arch }}/

      - name: Upload kmtest logs
        if: inputs.run_kmtest && always()
        uses: actions/upload-artifact@v4
        with:
          name: "kmtest-${{ inputs.arch }}"
          path: |
            build-${{ inputs.arch }}.log
            build-kmtest-runner-${{ inputs.arch }}.log
            build-${{ inputs.arch }}-kmtest-image.log
            qemu-kmtest-${{ inputs.arch }}.log
