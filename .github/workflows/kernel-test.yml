# Reusable kernel build + QEMU smoke + kmtest workflow.
#
# Called by build.yml, qemu-smoke.yml, and kmtest.yml via `uses:`.
# The default CI contract is intentionally explicit:
#
#   arch      boot mode   cargo target
#   aarch64   uefi        targets/aarch64-uefi-loader.json
#   riscv64   uefi        targets/riscv64-uefi-loader.json
#   x86_64    uefi        targets/x86_64-uefi-loader.json
#
# Plain local `cargo build` targets the repository-default aarch64 UEFI loader
# via .cargo/config.toml. RISC-V and x86_64 UEFI are built explicitly through
# `cargo xtask image --arch <arch>` or `ARCH=<arch> ./scripts/ci/run_qemu.sh`.

name: Kernel Test (reusable)

on:
  workflow_call:
    inputs:
      arch:
        description: "Target architecture: aarch64 | riscv64 | x86_64"
        required: true
        type: string

      run_build:
        description: "Run debug + release kernel builds"
        required: false
        type: boolean
        default: false

      run_smoke:
        description: "Boot the kernel under QEMU and assert serial boot markers"
        required: false
        type: boolean
        default: false

      run_kmtest:
        description: "Run kmtest under QEMU when the required userspace toolchain is available"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  kernel-test:
    name: "${{ inputs.arch }} [${{ inputs.run_build && 'build' || '' }}${{ inputs.run_smoke && 'smoke' || '' }}${{ inputs.run_kmtest && 'kmtest' || '' }}]"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          components: rust-src, llvm-tools-preview, rustfmt, clippy

      - name: Resolve boot contract
        run: |
          case "${{ inputs.arch }}" in
            aarch64)
              echo "BOOT=uefi" >> "$GITHUB_ENV"
              echo "TARGET_SHORT=aarch64-uefi-loader" >> "$GITHUB_ENV"
              ;;
            riscv64)
              echo "BOOT=uefi" >> "$GITHUB_ENV"
              echo "TARGET_SHORT=riscv64-uefi-loader" >> "$GITHUB_ENV"
              ;;
            x86_64)
              echo "BOOT=uefi" >> "$GITHUB_ENV"
              echo "TARGET_SHORT=x86_64-uefi-loader" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported arch: ${{ inputs.arch }}" >&2
              exit 2
              ;;
          esac

      - name: Install common build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends clang lld llvm make cpio

      - name: Install QEMU and firmware
        if: inputs.run_smoke || inputs.run_kmtest
        run: |
          case "${{ inputs.arch }}" in
            aarch64)
              sudo apt-get install -y --no-install-recommends qemu-system-arm qemu-efi-aarch64 mtools
              ;;
            riscv64)
              sudo apt-get install -y --no-install-recommends qemu-system-misc qemu-efi-riscv64 u-boot-qemu mtools
              ;;
            x86_64)
              sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf mtools musl-tools
              ;;
          esac

      - name: Build kernel debug
        if: inputs.run_build || inputs.run_smoke
        run: |
          ARCH="${{ inputs.arch }}" BOOT="${BOOT}" bash scripts/ci/build.sh \
            2>&1 | tee "build-${{ inputs.arch }}.log"

      - name: Build kernel release
        if: inputs.run_build
        run: |
          ARCH="${{ inputs.arch }}" BOOT="${BOOT}" RELEASE=1 bash scripts/ci/build.sh \
            2>&1 | tee "build-${{ inputs.arch }}-release.log"

      - name: Build aarch64 UEFI ESP image
        if: inputs.run_smoke && inputs.arch == 'aarch64'
        run: |
          cargo xtask image --arch aarch64 --debug \
            2>&1 | tee "build-aarch64-image.log"
          test -f boot-aarch64.img

      - name: QEMU smoke test (aarch64 UEFI)
        if: inputs.run_smoke && inputs.arch == 'aarch64'
        run: |
          mkdir -p logs/aarch64
          FW_CODE=/usr/share/AAVMF/AAVMF_CODE.fd
          if [ ! -f "$FW_CODE" ]; then
            FW_CODE=/usr/share/qemu-efi-aarch64/QEMU_EFI.fd
          fi
          test -f "$FW_CODE"

          if [ -f /usr/share/AAVMF/AAVMF_VARS.fd ]; then
            cp /usr/share/AAVMF/AAVMF_VARS.fd /tmp/AAVMF_VARS.fd
          else
            dd if=/dev/zero of=/tmp/AAVMF_VARS.fd bs=1M count=64 2>/dev/null
          fi

          set +e
          timeout 45 qemu-system-aarch64 \
            -machine virt \
            -cpu cortex-a57 \
            -m 256M \
            -drive if=pflash,unit=0,format=raw,readonly=on,file="$FW_CODE" \
            -drive if=pflash,unit=1,format=raw,file=/tmp/AAVMF_VARS.fd \
            -drive if=virtio,format=raw,file=boot-aarch64.img \
            -serial stdio -display none -no-reboot -no-shutdown \
            -d guest_errors,cpu_reset \
            > "qemu-aarch64.log" 2>&1
          status=$?
          set -e
          cat "qemu-aarch64.log" | tee logs/aarch64/serial.log
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            echo "QEMU exited unexpectedly with status $status" >&2
            exit "$status"
          fi

      - name: Build riscv64 UEFI ESP image
        if: inputs.run_smoke && inputs.arch == 'riscv64'
        run: |
          cargo xtask image --arch riscv64 --debug \
            2>&1 | tee "build-riscv64-image.log"
          test -f boot-riscv64.img

      - name: QEMU smoke test (riscv64 UEFI)
        if: inputs.run_smoke && inputs.arch == 'riscv64'
        run: |
          mkdir -p logs/riscv64

          find_existing_file() {
            for path in "$@"; do
              [ -f "$path" ] && { echo "$path"; return 0; }
            done
            return 1
          }

          FW_KIND=""
          FW_CODE=""
          FW_VARS=""
          if FW_CODE=$(find_existing_file \
              /usr/share/qemu-efi-riscv64/RISCV_VIRT_CODE.fd \
              /usr/share/edk2/riscv64/RISCV_VIRT_CODE.fd \
              /usr/share/qemu/edk2-riscv-code.fd \
              /usr/share/qemu/edk2-riscv64-code.fd); then
            FW_KIND="edk2"
            FW_VARS=/tmp/RISCV_VIRT_VARS.fd
            dd if=/dev/zero of="$FW_VARS" bs=1M count=64 2>/dev/null
          elif FW_CODE=$(find_existing_file \
              /usr/lib/u-boot/qemu-riscv64_smode/uboot.elf \
              /usr/lib/u-boot/qemu-riscv64/uboot.elf \
              /usr/share/u-boot/qemu-riscv64_smode/uboot.elf \
              /usr/share/u-boot/qemu-riscv64/uboot.elf); then
            FW_KIND="uboot"
          else
            echo "RISC-V UEFI firmware not found" >&2
            exit 1
          fi

          QEMU_FW_ARGS=()
          if [ "$FW_KIND" = "edk2" ]; then
            QEMU_FW_ARGS+=(
              -drive "if=pflash,unit=0,format=raw,file=${FW_CODE},readonly=on"
              -drive "if=pflash,unit=1,format=raw,file=${FW_VARS}"
            )
          else
            QEMU_FW_ARGS+=(-bios "$FW_CODE")
          fi

          set +e
          timeout 60 qemu-system-riscv64 \
            -machine virt \
            -cpu rv64 \
            -m 256M \
            "${QEMU_FW_ARGS[@]}" \
            -drive if=virtio,format=raw,file=boot-riscv64.img \
            -serial stdio -display none -no-reboot -no-shutdown \
            -d guest_errors,cpu_reset \
            > "qemu-riscv64.log" 2>&1
          status=$?
          set -e
          cat "qemu-riscv64.log" | tee logs/riscv64/serial.log
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            echo "QEMU exited unexpectedly with status $status" >&2
            exit "$status"
          fi

      - name: Build x86_64 UEFI ESP image
        if: inputs.run_smoke && inputs.arch == 'x86_64'
        run: |
          cargo xtask image --arch x86_64 --debug \
            2>&1 | tee "build-x86_64-image.log"
          test -f boot-x86_64.img

      - name: QEMU smoke test (x86_64)
        if: inputs.run_smoke && inputs.arch == 'x86_64'
        run: |
          mkdir -p logs/x86_64
          cp /usr/share/OVMF/OVMF_VARS.fd /tmp/OVMF_VARS.fd
          set +e
          timeout 30 qemu-system-x86_64 \
            -machine q35 \
            -cpu qemu64,+xsave,+avx \
            -m 256M \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE.fd \
            -drive if=pflash,format=raw,file=/tmp/OVMF_VARS.fd \
            -drive if=virtio,format=raw,file=boot-x86_64.img \
            -netdev user,id=net0,net=10.0.2.0/24,host=10.0.2.2,dns=10.0.2.3,dhcpstart=10.0.2.15 \
            -device virtio-net-pci,netdev=net0,id=nic0 \
            -serial stdio -display none -no-reboot -no-shutdown \
            -d guest_errors,cpu_reset \
            > "qemu-x86_64.log" 2>&1
          status=$?
          set -e
          cat "qemu-x86_64.log" | tee logs/x86_64/serial.log
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            echo "QEMU exited unexpectedly with status $status" >&2
            exit "$status"
          fi

      - name: Assert smoke markers
        if: inputs.run_smoke
        run: |
          LOG="qemu-${{ inputs.arch }}.log"
          case "${{ inputs.arch }}" in
            aarch64)
              grep -q 'aarch64: exception vectors installed' "$LOG"
              grep -q 'aarch64: MMU enabled' "$LOG"
              grep -q 'aarch64: heap ready' "$LOG"
              grep -q 'aarch64: kernel_main: idle' "$LOG"
              ;;
            riscv64)
              grep -q 'RustOS (RISC-V) booting via UEFI' "$LOG"
              ;;
            x86_64)
              grep -q 'RustOS \[PRIMARY\] x86_64 booting via UEFI' "$LOG"
              ;;
          esac

      - name: QEMU kmtest boot (x86_64)
        if: inputs.run_kmtest && inputs.arch == 'x86_64'
        run: |
          ARCH=x86_64 bash scripts/ci/run_qemu.sh --boot uefi --test --timeout 90 \
            2>&1 | tee "qemu-kmtest-x86_64.log"

      - name: Skip kmtest without musl cross toolchain
        if: inputs.run_kmtest && inputs.arch != 'x86_64'
        run: |
          echo "kmtest for ${{ inputs.arch }} requires a Linux-musl cross compiler that is not provided by Ubuntu by default."
          echo "Skipping until the CI image provides the matching musl cross compiler."

      - name: Upload build artifacts
        if: inputs.run_build && always()
        uses: actions/upload-artifact@v4
        with:
          name: "build-${{ inputs.arch }}"
          path: |
            build-${{ inputs.arch }}.log
            build-${{ inputs.arch }}-release.log
            target/${{ env.TARGET_SHORT }}/release/rustos*

      - name: Upload smoke logs
        if: inputs.run_smoke && always()
        uses: actions/upload-artifact@v4
        with:
          name: "smoke-${{ inputs.arch }}"
          path: |
            build-${{ inputs.arch }}.log
            build-${{ inputs.arch }}-image.log
            qemu-${{ inputs.arch }}.log
            logs/${{ inputs.arch }}/serial.log

      - name: Upload kmtest logs
        if: inputs.run_kmtest && always()
        uses: actions/upload-artifact@v4
        with:
          name: "kmtest-${{ inputs.arch }}"
          path: |
            qemu-kmtest-${{ inputs.arch }}.log
