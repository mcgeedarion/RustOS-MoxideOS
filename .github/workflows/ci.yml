name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt-and-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm lld ripgrep musl-tools cpio mtools
      - name: Show pinned toolchain
        run: rustup show
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy on workspace
        run: |
          cargo clippy --workspace --all-targets --all-features \
            -Z build-std=core,alloc,compiler_builtins \
            -Z build-std-features=compiler-builtins-mem \
            -- -D warnings
      - name: Check module hygiene
        run: cargo xtask lint-modules

  build-matrix:
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            boot: uefi
          - arch: riscv64
            boot: uefi
          - arch: riscv64
            boot: sbi
          - arch: x86_64
            boot: uefi
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm lld musl-tools cpio mtools gcc-riscv64-unknown-elf
      - name: Build ${{ matrix.arch }} ${{ matrix.boot }}
        run: cargo xtask build --arch ${{ matrix.arch }} --boot ${{ matrix.boot }}

  qemu-x86:
    runs-on: ubuntu-latest
    needs: build-matrix
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU and userspace tools
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm lld musl-tools cpio mtools ovmf qemu-system-x86
      - name: Run x86_64 UEFI smoke
        run: ARCH=x86_64 ./scripts/ci/run_qemu.sh --boot uefi --smoke --timeout 60
      - name: Run x86_64 UEFI kmtest
        run: ARCH=x86_64 ./scripts/ci/run_qemu.sh --boot uefi --test --timeout 90
