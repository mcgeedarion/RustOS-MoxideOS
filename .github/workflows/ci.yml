name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C force-frame-pointers=yes"

jobs:
  build-and-smoke-test:
    name: Build + QEMU smoke test
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Rust toolchain (nightly + bare-metal target) ────────────────────
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src, llvm-tools-preview

      # ── Cargo cache ─────────────────────────────────────────────────────
      - uses: Swatinem/rust-cache@v2

      # ── System deps (QEMU + GRUB ISO tools + musl) ──────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 grub-pc-bin grub-common xorriso mtools \
            musl-tools

      # ── Build kernel (default features = no Wayland) ─────────────────────
      - name: Build kernel (release)
        run: |
          cargo build \
            --target x86_64-unknown-none \
            --release \
            2>&1 | tee build.log
          if grep -q '^error' build.log; then exit 1; fi

      # ── Build with wayland feature (compile-only, no QEMU) ───────────────
      - name: Build kernel with wayland feature
        run: |
          cargo build \
            --target x86_64-unknown-none \
            --release \
            --features wayland \
            2>&1 | tee build-wayland.log
          if grep -q '^error' build-wayland.log; then exit 1; fi

      # ── Build pthread test binary (static musl) ──────────────────────────
      - name: Build pthread test binary
        run: |
          musl-gcc -static -O0 -o tests/pthread_test \
            tests/pthread_test.c -lpthread
          file tests/pthread_test

      # ── Pack initrd with test binary ─────────────────────────────────────
      # Creates a minimal cpio newc initrd:
      #   /init  → a tiny shell script that runs the test binary and
      #            writes the result to the serial console, then halts.
      # The kernel must already have a working VFS + exec path; if init
      # fails to exec, the serial output will be missing the sentinel and
      # CI will fail with a clear log.
      - name: Pack initrd
        run: |
          mkdir -p initrd_root/bin
          cp tests/pthread_test initrd_root/bin/pthread_test

          # Minimal /init: exec the test, then trigger QEMU shutdown via
          # the debug exit port (0xf4) so the VM exits cleanly.
          cat > initrd_root/init << 'INIT_EOF'
          #!/bin/sh
          /bin/pthread_test
          # Signal QEMU to exit: write 0x00 to isa-debug-exit port 0xf4
          # Exit code = (val << 1) | 1; writing 0 → qemu exits with code 1
          # which is fine — CI checks the log, not the exit code.
          busybox poweroff -f 2>/dev/null || echo "halt"
          INIT_EOF
          chmod +x initrd_root/init

          # Build the cpio archive
          (cd initrd_root && find . | cpio --quiet -H newc -o) > initrd.img
          ls -lh initrd.img

      # ── Assemble bootable ISO ────────────────────────────────────────────
      - name: Assemble ISO
        run: |
          mkdir -p iso/boot/grub
          cp target/x86_64-unknown-none/release/librustos.a iso/boot/kernel.elf
          cat > iso/boot/grub/grub.cfg <<'EOF'
          set timeout=0
          set default=0
          menuentry "rustos" {
            multiboot2 /boot/kernel.elf
            boot
          }
          EOF
          grub-mkrescue -o rustos.iso iso/ 2>&1

      # ── QEMU smoke test (boot sentinel) ─────────────────────────────────
      - name: QEMU boot smoke test
        timeout-minutes: 2
        run: |
          timeout 10 qemu-system-x86_64 \
            -nographic \
            -no-reboot \
            -m 128M \
            -serial stdio \
            -cdrom rustos.iso \
            2>&1 | tee qemu-boot.log || true
          if grep -q 'kernel_main reached' qemu-boot.log; then
            echo "BOOT SMOKE TEST PASSED"
          else
            echo "BOOT SMOKE TEST FAILED — sentinel not found:"
            cat qemu-boot.log
            exit 1
          fi

      # ── QEMU pthread test (userspace sentinel) ───────────────────────────
      # Boots with the initrd; the kernel must exec /init which runs
      # pthread_test and prints "PTHREAD_TEST PASS" to serial (stdout).
      # Timeout is 30s to allow for slower CI runners.
      - name: QEMU pthread test
        timeout-minutes: 2
        run: |
          timeout 30 qemu-system-x86_64 \
            -nographic \
            -no-reboot \
            -m 256M \
            -serial stdio \
            -cdrom rustos.iso \
            -initrd initrd.img \
            -append "init=/init" \
            2>&1 | tee qemu-pthread.log || true

          if grep -q 'PTHREAD_TEST PASS' qemu-pthread.log; then
            echo "PTHREAD TEST PASSED"
          else
            echo "PTHREAD TEST FAILED — output:"
            cat qemu-pthread.log
            exit 1
          fi

      # ── Upload artefacts on failure ──────────────────────────────────────
      - name: Upload logs and test binary
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            build.log
            build-wayland.log
            qemu-boot.log
            qemu-pthread.log
            tests/pthread_test
