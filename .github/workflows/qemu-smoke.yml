# QEMU Smoke workflow — matrix caller.
#
# Drives kernel-test.yml (run_smoke: true) for every supported architecture.
# Boots the kernel under QEMU, probes the VirtIO NIC, and asserts serial
# markers for boot, NIC registration, and arch-specific subsystems (SMP/PLIC
# on riscv64).  The CL self-test markers (alloc_smoke, trap_smoke,
# uart_smoke) are also validated on every arch.
#
# Architecture notes
# ──────────────────────────────────────────────────────────────────────────
#   x86_64   OVMF UEFI pflash, q35, virtio-net-pci
#   aarch64  virt/cortex-a72, virtio-net-device (MMIO)  [NEW]
#   riscv64  OpenSBI virt, -smp 2, virtio-net-device (MMIO), PLIC + SMP checks

name: QEMU Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: "smoke • ${{ matrix.arch }}"
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64, riscv64]

    uses: ./.github/workflows/kernel-test.yml
    with:
      arch:      ${{ matrix.arch }}
      run_smoke: true
