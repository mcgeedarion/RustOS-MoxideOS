# QEMU Smoke workflow — matrix caller.
#
# Drives kernel-test.yml (run_smoke: true) for every supported architecture.
# Boots the kernel under QEMU and asserts architecture-specific early serial
# boot markers.
#
# Architecture notes
# ──────────────────────────────────────────────────────────────────────────
#   aarch64  UEFI pflash on QEMU virt with AAVMF/QEMU_EFI firmware and an ESP image
#   riscv64  UEFI on QEMU virt with EDK2 or U-Boot firmware and an ESP image
#   x86_64   OVMF UEFI pflash, q35, FAT32 ESP image, virtio-net-pci

name: QEMU Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: "smoke • ${{ matrix.arch }}"
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, riscv64, x86_64]

    uses: ./.github/workflows/kernel-test.yml
    with:
      arch: ${{ matrix.arch }}
      run_smoke: true
