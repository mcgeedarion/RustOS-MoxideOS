# QEMU Smoke workflow — matrix caller.
#
# Drives kernel-test.yml (run_smoke: true) for every supported architecture.
# Boots the kernel under QEMU and asserts the shared early serial boot markers:
# kernel_main reached, uart_smoke, alloc_smoke, and trap_smoke.
#
# Architecture notes
# ──────────────────────────────────────────────────────────────────────────
#   aarch64  bare-metal QEMU virt/cortex-a72, virtio-net-device
#   riscv64  OpenSBI virt, -smp 2, virtio-net-device
#   x86_64   OVMF UEFI pflash, q35, FAT32 ESP image, virtio-net-pci

name: QEMU Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: "smoke • ${{ matrix.arch }}"
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, riscv64, x86_64]

    uses: ./.github/workflows/kernel-test.yml
    with:
      arch: ${{ matrix.arch }}
      run_smoke: true
