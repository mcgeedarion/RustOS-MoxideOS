name: QEMU Smoke Build & CL Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # RISC-V: OpenSBI → _start (boot.rs) → kernel_main
  # Includes virtio-net-device (VirtIO-MMIO + SLIRP NAT) so the MMIO NIC
  # driver probe path is exercised on every CI run via the FDT walker.
  # ────────────────────────────────────────────────────────────────────────
  riscv-smoke:
    name: RISC-V Build + QEMU Boot
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv64gc-unknown-none-elf
          components: rust-src, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          key: riscv64-debug

      - name: Install QEMU (RISC-V)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends qemu-system-riscv64

      - name: Build rustos (RISC-V debug)
        run: |
          cargo build \
            --target riscv64gc-unknown-none-elf \
            -Z build-std=core,alloc,compiler_builtins \
            -Z build-std-features=compiler-builtins-mem \
            2>&1 | tee build-riscv.log
          tail -20 build-riscv.log
          test -f target/riscv64gc-unknown-none-elf/debug/rustos || \
            { echo "ELF not found"; exit 1; }
          file target/riscv64gc-unknown-none-elf/debug/rustos

      # virtio-net-device uses the VirtIO-MMIO bus that the QEMU virt machine
      # exposes by default (no PCIe required).  QEMU generates a DTB that
      # includes a virtio_mmio@<base> node for the NIC; the FDT walker in
      # src/arch/riscv64/fdt.rs discovers it and calls virtio_net_mmio::probe().
      # SLIRP user networking — no TAP, no root, works on GitHub Actions runners.
      - name: QEMU boot + NIC probe smoke test (RISC-V)
        run: |
          timeout 10 qemu-system-riscv64 \
            -machine virt \
            -cpu rv64 \
            -m 256M \
            -bios default \
            -kernel target/riscv64gc-unknown-none-elf/debug/rustos \
            -netdev user,id=net0,net=10.0.2.0/24,host=10.0.2.2,dns=10.0.2.3,dhcpstart=10.0.2.15 \
            -device virtio-net-device,netdev=net0,id=nic0 \
            -serial stdio \
            -display none \
            -no-reboot \
            -d guest_errors,cpu_reset \
            2>&1 | tee qemu-riscv.log || true
          cat qemu-riscv.log

          # Core boot check.
          grep -q 'kernel_main reached' qemu-riscv.log && \
            echo "✅ BOOT SMOKE TEST PASSED" || \
            { echo "❌ BOOT SMOKE TEST FAILED"; exit 1; }

          # NIC driver probe check.
          # virtio_net_mmio::probe() is called from the FDT walker; it reads
          # MagicValue/Version/DeviceID from MMIO and prints:
          #   "virtio_net_mmio: found net device at <base> (v<N>)"
          #   "virtio_net_mmio: device ready"
          #   "nic: registered device 0 MAC xx:xx:xx:xx:xx:xx"
          grep -q 'virtio_net_mmio: device ready' qemu-riscv.log && \
            echo "✅ RISC-V NIC PROBE PASSED" || \
            { echo "❌ RISC-V NIC PROBE FAILED (virtio_net_mmio::probe did not print 'device ready')"; exit 1; }

          grep -q 'nic: registered device 0' qemu-riscv.log && \
            echo "✅ RISC-V NIC REGISTERED" || \
            { echo "❌ RISC-V NIC REGISTER FAILED"; exit 1; }

      - name: CL test pass
        run: |
          FAILED=0
          for t in "alloc_smoke" "trap_smoke" "uart_smoke"; do
            grep -q "TEST PASS: ${t}" qemu-riscv.log && \
              echo "  ✅ ${t}" || \
              { echo "  ❌ ${t}"; FAILED=$((FAILED+1)); }
          done
          [ $FAILED -eq 0 ] || exit 1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: riscv-logs
          path: |
            build-riscv.log
            qemu-riscv.log

  # ────────────────────────────────────────────────────────────────────────
  # x86_64: OVMF (UEFI) → uefi_start → kernel_main
  # Includes virtio-net-pci (user-mode NAT) so the NIC driver probe path
  # is exercised on every CI run.
  # ────────────────────────────────────────────────────────────────────────
  x86-smoke:
    name: x86_64 Build + QEMU UEFI Boot
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-debug

      - name: Install QEMU (x86) + OVMF
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf

      - name: Build rustos (x86_64 debug)
        run: |
          cargo build \
            --target x86_64-unknown-none \
            -Z build-std=core,alloc,compiler_builtins \
            -Z build-std-features=compiler-builtins-mem \
            2>&1 | tee build-x86.log
          tail -20 build-x86.log
          test -f target/x86_64-unknown-none/debug/rustos || \
            { echo "ELF not found"; exit 1; }
          file target/x86_64-unknown-none/debug/rustos

      - name: QEMU UEFI boot + NIC probe smoke test
        run: |
          cp /usr/share/OVMF/OVMF_VARS.fd /tmp/OVMF_VARS.fd

          timeout 10 qemu-system-x86_64 \
            -machine q35 \
            -cpu qemu64 \
            -m 256M \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE.fd \
            -drive if=pflash,format=raw,file=/tmp/OVMF_VARS.fd \
            -kernel target/x86_64-unknown-none/debug/rustos \
            -netdev user,id=net0,net=10.0.2.0/24,host=10.0.2.2,dns=10.0.2.3,dhcpstart=10.0.2.15 \
            -device virtio-net-pci,netdev=net0,id=nic0 \
            -serial stdio \
            -display none \
            -no-reboot \
            -d guest_errors,cpu_reset \
            2>&1 | tee qemu-x86.log || true
          cat qemu-x86.log

          grep -q 'kernel_main reached' qemu-x86.log && \
            echo "✅ x86 BOOT SMOKE TEST PASSED" || \
            { echo "❌ x86 BOOT SMOKE TEST FAILED"; exit 1; }

          grep -q 'virtio_net: device ready' qemu-x86.log && \
            echo "✅ NIC PROBE PASSED" || \
            { echo "❌ NIC PROBE FAILED"; exit 1; }

          grep -q 'nic: registered device 0' qemu-x86.log && \
            echo "✅ NIC REGISTERED" || \
            { echo "❌ NIC REGISTER FAILED"; exit 1; }

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: x86-logs
          path: |
            build-x86.log
            qemu-x86.log
