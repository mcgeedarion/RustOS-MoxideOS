# kmtest workflow — matrix caller.
#
# Drives kernel-test.yml (run_kmtest: true) for every supported architecture.
# x86_64 runs under QEMU/OVMF using the host musl-tools package. aarch64 and
# riscv64 are currently skipped inside the reusable workflow until the CI image
# provides aarch64-linux-musl-gcc and riscv64-linux-musl-gcc.
#
# Architecture notes
# ──────────────────────────────────────────────────────────────────────────
#   aarch64  requires aarch64-linux-musl-gcc before kmtest can run
#   riscv64  requires riscv64-linux-musl-gcc before kmtest can run
#   x86_64   OVMF UEFI boot, musl-tools

name: kmtest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kmtest:
    name: "kmtest • ${{ matrix.arch }}"
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, riscv64, x86_64]

    uses: ./.github/workflows/kernel-test.yml
    with:
      arch: ${{ matrix.arch }}
      run_kmtest: true
