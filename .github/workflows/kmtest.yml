# kmtest workflow — matrix caller.
#
# Drives kernel-test.yml (run_kmtest: true) for every supported architecture.
# Builds the kernel with --features kmtest, compiles the userspace runner via
# `make ARCH=<arch> kmtest`, stages it into a cpio initramfs, boots under
# QEMU with init=/bin/kmtest, and asserts the kmtest summary line.
#
# Architecture notes
# ──────────────────────────────────────────────────────────────────────────
#   aarch64  virt/cortex-a72 -kernel boot, aarch64 musl cross-compiler
#   riscv64  OpenSBI virt -kernel boot, riscv64 musl cross-compiler
#   x86_64   OVMF UEFI boot, musl-tools
#
# The parse-results logic (grep for PASS/FAIL/summary) is identical across
# all architectures and lives once in kernel-test.yml.

name: kmtest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kmtest:
    name: "kmtest • ${{ matrix.arch }}"
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, riscv64, x86_64]

    uses: ./.github/workflows/kernel-test.yml
    with:
      arch:       ${{ matrix.arch }}
      run_kmtest: true
