# Build workflow — matrix caller.
#
# Drives kernel-test.yml (run_build: true) for every supported architecture.
# All build logic lives in kernel-test.yml; add new architectures here only.
#
# Architecture × boot-mode support:
#   aarch64 — uefi, baremetal
#   riscv64 — uefi, sbi
#   x86_64  — uefi, multiboot

name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.arch }})
    uses: ./.github/workflows/kernel-test.yml
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, riscv64, x86_64]
    with:
      arch:      ${{ matrix.arch }}
      run_build: true
      run_test:  false
      run_qemu:  false
